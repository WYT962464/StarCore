name: StarCore
options:
  bundleIdPrefix: com.starcore
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
  projectFormat: xcode15_0

targets:
  StarCore:
    type: application
    platform: iOS
    sources:
      - path: StarCoreApp
        excludes:
          - "Makefile"
          - "README.md"
          - "resources"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.starcore.app
        INFOPLIST_FILE: StarCoreApp/Info.plist
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
