name: StarCore
options:
  bundleIdPrefix: com.starcore
  deploymentTarget:
    iOS: '15.0'
  createIntermediateGroups: true
  projectFormat: xcode15_0

targets:
  StarCore:
    type: application
    platform: iOS
    sources:
      - path: StarCore
    resources:
      - path: StarCore/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.starcore.app
        MARKETING_VERSION: '1.0'
        CURRENT_PROJECT_VERSION: '1'
        SWIFT_VERSION: '5.9'
        TARGETED_DEVICE_FAMILY: '1'
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: StarCore/App/Info.plist
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        CODE_SIGN_IDENTITY: ''
        CODE_SIGNING_REQUIRED: false
        CODE_SIGNING_ALLOWED: false
        ARCHS: x86_64
        VALID_ARCHS: x86_64 arm64
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
