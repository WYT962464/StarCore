name: TestMinimal
options:
  bundleIdPrefix: com.test
  deploymentTarget:
    iOS: '15.0'
  createIntermediateGroups: true
  projectFormat: xcode15_0
targets:
  TestMinimal:
    type: application
    platform: iOS
    sources:
    - path: TestMinimal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.test.minimal
        INFOPLIST_FILE: TestMinimal/Info.plist
        MARKETING_VERSION: '1.0'
        CURRENT_PROJECT_VERSION: '1'
        SWIFT_VERSION: '5.9'
        TARGETED_DEVICE_FAMILY: '1'
        CODE_SIGN_IDENTITY: ''
        CODE_SIGNING_REQUIRED: false
        CODE_SIGNING_ALLOWED: false
        ARCHS: arm64
        VALID_ARCHS: arm64
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
