name: Build iOS App

on:
  push:
    branches: [ main, v1.0-dual-layer ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Package Dependencies
        run: swift package resolve

      - name: List Available Schemes
        run: xcodebuild -list -workspace StarCore.xcworkspace

      - name: Build with xcodebuild
        run: |
          # Find the correct scheme name
          SCHEME=$(xcodebuild -list -workspace StarCore.xcworkspace 2>/dev/null | grep -A5 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          echo "Using scheme: $SCHEME"
          
          xcodebuild build \
            -workspace StarCore.xcworkspace \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find build -name "*.app" -path "*/Release-iphoneos/*" -type d | head -1)
          echo "Found app at: $APP_PATH"
          
          mkdir -p IPA/Payload
          cp -R "$APP_PATH" IPA/Payload/
          
          cd IPA
          zip -r StarCore-unsigned.ipa Payload/
          echo "IPA created successfully!"
          ls -lh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCore-unsigned
          path: IPA/*.ipa
