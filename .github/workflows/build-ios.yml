name: Build iOS App

on:
  push:
    branches: [ v1.0-unified ]
  workflow_dispatch:

jobs:
  build-app:
    name: Build App IPA
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP 'CFBundleShortVersionString\s*<string>\K[^<]+' StarCore/App/Info.plist 2>/dev/null || echo "1.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Show Project Info
        run: |
          echo "=== Project Structure ==="
          ls -la
          echo ""
          echo "=== StarCore Directory ==="
          find StarCore -name "*.swift" | head -20
          echo ""
          echo "=== Generated Project ==="
          if [ -f StarCore.xcodeproj/project.pbxproj ]; then
            echo "project.pbxproj: $(wc -l < StarCore.xcodeproj/project.pbxproj) lines"
            echo "Swift files in project:"
            grep -c "\.swift" StarCore.xcodeproj/project.pbxproj || echo "0"
          fi
          echo ""
          echo "=== xcodebuild -list ==="
          xcodebuild -project StarCore.xcodeproj -list 2>&1

      - name: Build App
        run: |
          echo "=== Starting Build ==="
          echo "Xcode version:"
          xcodebuild -version
          
          echo ""
          echo "=== Project Info ==="
          xcodebuild -project StarCore.xcodeproj -showBuildSettings 2>&1 | head -30
          
          echo ""
          echo "=== Building ==="
          set -o pipefail
          xcodebuild build \
            -project StarCore.xcodeproj \
            -scheme StarCore \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee build.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          echo ""
          echo "=== Build Exit Code: $BUILD_EXIT_CODE ==="
          echo ""
          echo "=== Full Error Output ==="
          cat build.log | grep -iE "error:|warning:|failed|cannot|unknown|undefined" || echo "No errors found in grep"
          
          echo ""
          echo "=== Build Products ==="
          find build -name "*.app" -type d -exec ls -lhR {} \; 2>/dev/null | head -50
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo ""
            echo "=== FAILING - Full log saved to build.log ==="
            exit $BUILD_EXIT_CODE
          fi

      - name: Package App IPA
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi
          
          echo "Found app: $APP_PATH"
          du -sh "$APP_PATH"
          
          mkdir -p IPA/Payload
          cp -R "$APP_PATH" IPA/Payload/
          cd IPA
          zip -r StarCore.ipa Payload/
          
          echo "=== IPA Created ==="
          ls -lh StarCore.ipa

      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCore-App
          path: IPA/*.ipa
          retention-days: 30
