name: Build iOS App

on:
  push:
    branches: [ v1.0-unified ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Show Generated Project
        run: |
          echo "=== Generated Project Structure ==="
          find . -name "*.xcodeproj" -type d
          echo ""
          echo "=== project.pbxproj (first 100 lines) ==="
          head -100 StarCore.xcodeproj/project.pbxproj

      - name: Build Archive
        run: |
          echo "=== Starting Build Archive ==="
          xcodebuild archive             -project StarCore.xcodeproj             -scheme StarCore             -sdk iphoneos             -configuration Release             -archivePath build/StarCore.xcarchive             CODE_SIGN_IDENTITY="-"             CODE_SIGNING_REQUIRED=NO             2>&1 | tee build.log
          
          echo "=== Build Log ==="
          cat build.log

      - name: Check Archive Contents
        if: success()
        run: |
          echo "=== Archive Structure ==="
          find build/StarCore.xcarchive -type d | head -20
          echo ""
          echo "=== Products/Applications ==="
          ls -la build/StarCore.xcarchive/Products/Applications/ 2>/dev/null || echo "Not found"
          echo ""
          echo "=== All .app files ==="
          find build/StarCore.xcarchive -name "*.app" -type d

      - name: Create IPA
        if: success()
        run: |
          # 查找 .app 文件
          APP_PATH=$(find build/StarCore.xcarchive -name "*.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive"
            exit 1
          fi
          
          echo "Found app: $APP_PATH"
          
          # 创建 Payload 目录
          mkdir -p IPA/Payload
          cp -R "$APP_PATH" IPA/Payload/
          
          # 创建 IPA
          cd IPA
          zip -r StarCore.ipa Payload/
          
          echo "=== IPA Created ==="
          ls -lh StarCore.ipa

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StarCore-unsigned
          path: IPA/*.ipa
          retention-days: 30
