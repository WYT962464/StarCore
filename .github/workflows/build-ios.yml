name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (real device, no signing)
        run: |
          xcodebuild archive \
            -project StarCore.xcodeproj \
            -scheme StarCore \
            -sdk iphoneos \
            -archivePath ${{ runner.temp }}/StarCore.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA directly from archive (no signing needed)
        run: |
          # 创建IPA目录结构
          mkdir -p ${{ runner.temp }}/IPA/Payload
          
          # 从archive里复制app
          cp -R ${{ runner.temp }}/StarCore.xcarchive/Products/Applications/*.app ${{ runner.temp }}/IPA/Payload/
          
          # 打包成IPA
          cd ${{ runner.temp }}/IPA
          zip -r StarCore-unsigned.ipa Payload/
          
          echo "IPA created successfully!"
          ls -lh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCore-unsigned
          path: ${{ runner.temp }}/IPA/*.ipa
