name: Build iOS App

on:
  push:
    branches: [ main, v1.0-dual-layer ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Swift Package Manager
        run: |
          # 先用xcodebuild基于Package.swift构建
          xcodebuild build \
            -scheme StarCoreApp \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          # 找到编译好的.app
          APP_PATH=$(find build -name "StarCoreApp.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          
          mkdir -p IPA/Payload
          cp -R "$APP_PATH" IPA/Payload/
          
          cd IPA
          zip -r StarCore-unsigned.ipa Payload/
          echo "IPA created successfully!"
          ls -lh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCore-unsigned
          path: IPA/*.ipa
