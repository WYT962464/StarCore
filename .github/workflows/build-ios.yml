name: Build iOS App

on:
  push:
    branches: [ v1.0-unified ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive             -project StarCore.xcodeproj             -scheme StarCore             -sdk iphoneos             -configuration Release             -archivePath build/StarCore.xcarchive             SKIP_INSTALL=NO             BUILD_LIBRARY_FOR_DISTRIBUTION=NO             CODE_SIGN_IDENTITY="-"             CODE_SIGNING_REQUIRED=NO             CODE_SIGNING_ALLOWED=NO             2>&1 | tee build.log

      - name: Show Build Log on Failure
        if: failure()
        run: |
          echo "=== Build Log ==="
          cat build.log || echo "No build log"

      - name: Export IPA
        if: success()
        run: |
          echo "=== Archive Contents ==="
          ls -la build/StarCore.xcarchive/Products/Applications/
          
          # 创建导出配置文件
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>debugging</string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>provisioningProfiles</key>
              <dict/>
          </dict>
          </plist>
          EOF
          
          mkdir -p IPA
          xcodebuild -exportArchive             -archivePath build/StarCore.xcarchive             -exportPath IPA             -exportOptionsPlist exportOptions.plist             2>&1 | tee export.log
          
          echo "=== IPA Created ==="
          ls -lh IPA/*.ipa 2>/dev/null || echo "No IPA found"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StarCore-unsigned
          path: IPA/*.ipa
          retention-days: 30
