name: Build iOS App

on:
  push:
    branches: [ v1.0-unified ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive             -project StarCore.xcodeproj             -scheme StarCore             -sdk iphoneos             -configuration Release             -archivePath build/StarCore.xcarchive             CODE_SIGN_IDENTITY="-"             CODE_SIGNING_REQUIRED=NO             2>&1 | tee build.log

      - name: Show Build Log on Failure
        if: failure()
        run: |
          echo "=== Build Log ==="
          cat build.log || echo "No build log"

      - name: Create IPA
        if: success()
        run: |
          echo "=== Archive Contents ==="
          find build/StarCore.xcarchive -name "*.app" -type d
          
          # 查找 .app 文件
          APP_PATH=$(find build/StarCore.xcarchive -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi
          echo "Found app: $APP_PATH"
          
          # 创建 Payload 目录
          mkdir -p IPA/Payload
          cp -R "$APP_PATH" IPA/Payload/
          
          # 创建 IPA
          cd IPA
          zip -r StarCore.ipa Payload/
          
          echo "=== IPA Created ==="
          ls -lh StarCore.ipa

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StarCore-unsigned
          path: IPA/*.ipa
          retention-days: 30
