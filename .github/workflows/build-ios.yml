name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build for iOS (simulator first, quick test)
        run: |
          xcodebuild clean build \
            -project StarCore.xcodeproj \
            -scheme StarCore \
            -sdk iphonesimulator \
            -configuration Debug

      - name: Archive (generic iOS device)
        run: |
          xcodebuild archive \
            -project StarCore.xcodeproj \
            -scheme StarCore \
            -sdk iphoneos \
            -archivePath ${{ runner.temp }}/StarCore.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create ExportOptions
        run: |
          cat > ${{ runner.temp }}/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>-</string>
              <key>provisioningProfiles</key>
              <dict/>
              <key>compileBitcode</key>
              <false/>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <false/>
              <key>thinning</key>
              <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA (unsigned)
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/StarCore.xcarchive \
            -exportPath ${{ runner.temp }}/IPA \
            -exportOptionsPlist ${{ runner.temp }}/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCore-unsigned
          path: ${{ runner.temp }}/IPA/*.ipa
