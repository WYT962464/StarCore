name: Build iOS App

on:
  push:
    branches: [ v1.0-unified ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive             -project StarCore.xcodeproj             -scheme StarCore             -sdk iphoneos             -configuration Release             -archivePath build/StarCore.xcarchive             SKIP_INSTALL=NO             BUILD_LIBRARY_FOR_DISTRIBUTION=NO             CODE_SIGN_IDENTITY="-"             CODE_SIGNING_REQUIRED=NO             CODE_SIGNING_ALLOWED=NO             2>&1 | tee build.log

      - name: Show Build Log on Failure
        if: failure()
        run: |
          echo "=== Build Log ==="
          cat build.log || echo "No build log"

      - name: Package IPA
        if: success()
        run: |
          echo "=== Archive Contents ==="
          ls -la build/StarCore.xcarchive/Products/Applications/
          
          # 查找 .app 文件
          APP_PATH=$(find build/StarCore.xcarchive/Products/Applications -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive"
            exit 1
          fi
          echo "Found app: $APP_PATH"
          
          mkdir -p IPA/Payload
          cp -R "$APP_PATH" IPA/Payload/
          
          cd IPA
          zip -r StarCore-unsigned.ipa Payload/
          echo "IPA created!"
          ls -lh StarCore-unsigned.ipa

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StarCore-unsigned
          path: IPA/*.ipa
          retention-days: 30
