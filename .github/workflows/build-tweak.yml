name: Build StarCoreTweak

on:
  push:
    branches:
      - v1.0-dual-layer
    paths:
      - 'StarCoreTweak/**'
      - '.github/workflows/build-tweak.yml'
  workflow_dispatch:

jobs:
  build-tweak:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git perl libssl-dev xz-utils clang llvm libplist-utils curl ldid
      
      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos
      
      - name: Setup Theos SDK
        run: |
          rm -rf ${{ github.workspace }}/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git ${{ github.workspace }}/theos/sdks
      
      - name: Setup iOS Toolchain
        run: |
          cd ${{ github.workspace }}/theos
          curl -sL https://github.com/kabiroberai/swift-toolchain-linux/releases/download/v2.1.0/swift-5.6.1-ubuntu20.04.tar.xz | tar -xJ
          mv swift-5.6.1-ubuntu20.04 toolchain/linux/iphone
          ln -sf ../toolchain/linux/iphone toolchain/swift
      
      - name: Build Tweak (rootless)
        working-directory: ./StarCoreTweak
        env:
          THEOS: ${{ github.workspace }}/theos
          THEOS_PACKAGE_SCHEME: rootless
        run: |
          make clean
          make package
      
      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCoreTweak-rootless
          path: ./StarCoreTweak/.theos/obj/*.deb
          retention-days: 7
