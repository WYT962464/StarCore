name: Build StarCoreTweak

on:
  push:
    branches:
      - v1.0-dual-layer
    paths:
      - 'StarCoreTweak/**'
      - '.github/workflows/build-tweak.yml'
  workflow_dispatch:

jobs:
  build-tweak:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install Theos and ldid
        run: |
          export THEOS=/tmp/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          brew install ldid fakeroot dpkg
          echo "THEOS=/tmp/theos" >> $GITHUB_ENV
      
      - name: Build Tweak (rootless)
        working-directory: ./StarCoreTweak
        env:
          THEOS_PACKAGE_SCHEME: rootless
        run: |
          make clean
          make package
      
      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCoreTweak-rootless
          path: ./StarCoreTweak/packages/*.deb
          retention-days: 7
