name: Build StarCoreTweak

on:
  push:
    branches:
      - v1.0-dual-layer
    paths:
      - 'StarCoreTweak/**'
      - '.github/workflows/build-tweak.yml'
  workflow_dispatch:

jobs:
  build-tweak:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git perl libssl-dev xz-utils clang llvm libplist-utils curl cpio
      
      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos
      
      - name: Setup Theos SDK
        run: |
          rm -rf ${{ github.workspace }}/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git ${{ github.workspace }}/theos/sdks
      
      - name: Setup iOS Toolchain
        run: |
          cd ${{ github.workspace }}/theos
          # 创建工具链目录
          mkdir -p toolchain/linux/iphone/bin
          
          # 下载ldid签名工具
          curl -sL https://github.com/poisondog/ldid/releases/download/v2.1.5.8/ldid -o toolchain/linux/iphone/bin/ldid
          chmod +x toolchain/linux/iphone/bin/ldid
          
          # 创建符号链接指向系统clang
          ln -sf $(which clang) toolchain/linux/iphone/bin/clang
          ln -sf $(which clang++) toolchain/linux/iphone/bin/clang++
          ln -sf $(which ld.lld) toolchain/linux/iphone/bin/ld
          ln -sf $(which ar) toolchain/linux/iphone/bin/ar
          ln -sf $(which strip) toolchain/linux/iphone/bin/strip
          
          ln -sf ../toolchain/linux/iphone toolchain/swift
      
      - name: Build Tweak (rootless)
        working-directory: ./StarCoreTweak
        env:
          THEOS: ${{ github.workspace }}/theos
          THEOS_PACKAGE_SCHEME: rootless
        run: |
          make clean
          make package
      
      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCoreTweak-rootless
          path: ./StarCoreTweak/.theos/obj/*.deb
          retention-days: 7
