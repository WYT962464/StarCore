name: Build StarCoreTweak

on:
  push:
    branches:
      - v1.0-dual-layer
    paths:
      - 'StarCoreTweak/**'
      - '.github/workflows/build-tweak.yml'
  workflow_dispatch:

jobs:
  build-tweak:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git perl libssl-dev xz-utils clang llvm libplist-utils
      
      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos
      
      - name: Build Tweak (rootless)
        working-directory: ./StarCoreTweak
        env:
          THEOS: ${{ github.workspace }}/theos
          THEOS_PACKAGE_SCHEME: rootless
        run: |
          make clean
          make package
      
      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCoreTweak-rootless
          path: ./StarCoreTweak/.theos/obj/*.deb
          retention-days: 7
