name: Build StarCoreApp

on:
  push:
    branches:
      - v1.0-dual-layer
    paths:
      - 'StarCoreApp/**'
      - '.github/workflows/build-app.yml'
  workflow_dispatch:

jobs:
  build-app:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Theos
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          export THEOS=$HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
      
      - name: Build StarCoreApp (rootless)
        working-directory: ./StarCoreApp
        env:
          THEOS_PACKAGE_SCHEME: rootless
        run: |
          make clean
          make package
      
      - name: Package IPA from .app
        run: |
          # Find the built .app bundle
          APP_DIR=$(find ./StarCoreApp/.theos/obj -name "*.app" -type d | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "No .app found"
            find ./StarCoreApp/.theos/obj -type f | head -20
            exit 1
          fi
          echo "Found app: $APP_DIR"
          ls -la "$APP_DIR/"
          
          # Create proper IPA
          mkdir -p /tmp/IPA/Payload
          cp -R "$APP_DIR" /tmp/IPA/Payload/
          cd /tmp/IPA
          zip -r /tmp/StarCoreApp.ipa Payload/
          echo "IPA created!"
          ls -lh /tmp/StarCoreApp.ipa
      
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCoreApp-v84
          path: /tmp/StarCoreApp.ipa
          retention-days: 30
      
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete old v8.4 release if exists, recreate
          gh release delete v8.4 --repo ${{ github.repository }} --yes || true
          gh release create v8.4 /tmp/StarCoreApp.ipa \
            --repo ${{ github.repository }} \
            --title "v8.4" \
            --notes "StarCore App v8.4 - 免费LLM + 扣子功能移植"
