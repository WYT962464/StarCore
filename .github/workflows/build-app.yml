name: Build StarCoreApp

on:
  push:
    branches:
      - v1.0-dual-layer
    paths:
      - 'StarCoreApp/**'
      - '.github/workflows/build-app.yml'
  workflow_dispatch:

jobs:
  build-app:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          export THEOS=$HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
      
      - name: Build StarCoreApp (rootless)
        working-directory: ./StarCoreApp
        env:
          THEOS_PACKAGE_SCHEME: rootless
        run: |
          make clean
          make package
      
      - name: Find IPA
        id: find_ipa
        run: |
          IPA_FILE=$(find ./StarCoreApp/.theos/obj -name "*.ipa" | head -1)
          if [ -z "$IPA_FILE" ]; then
            echo "No IPA found, checking for .app"
            find ./StarCoreApp/.theos/obj -name "*.app" | head -5
            # Try to package manually
            APP_DIR=$(find ./StarCoreApp/.theos/obj -name "*.app" -type d | head -1)
            if [ -n "$APP_DIR" ]; then
              mkdir -p /tmp/IPA/Payload
              cp -R "$APP_DIR" /tmp/IPA/Payload/
              cd /tmp/IPA
              zip -r StarCoreApp.ipa Payload/
              IPA_FILE="/tmp/IPA/StarCoreApp.ipa"
            fi
          fi
          echo "ipa_path=$IPA_FILE" >> $GITHUB_OUTPUT
          echo "Found IPA: $IPA_FILE"
      
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCoreApp-v84
          path: ${{ steps.find_ipa.outputs.ipa_path }}
          retention-days: 30
      
      - name: Upload to GitHub Release
        if: steps.find_ipa.outputs.ipa_path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IPA_FILE="${{ steps.find_ipa.outputs.ipa_path }}"
          if [ -f "$IPA_FILE" ]; then
            gh release upload v8.4 "$IPA_FILE" --repo ${{ github.repository }} --clobber || \
            gh release create v8.4 "$IPA_FILE" --repo ${{ github.repository }} --title "v8.4" --notes "StarCore App v8.4 - е…Ќиґ№LLM + ж‰Је­ђеЉџиѓЅз§»ж¤Ќ"
          fi
