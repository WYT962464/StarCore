name: Build StarCoreApp

on:
  push:
    branches:
      - v1.0-dual-layer
    paths:
      - 'StarCoreApp/**'
      - '.github/workflows/build-app.yml'
  workflow_dispatch:

jobs:
  build-app:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Theos
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          export THEOS=$HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
      
      - name: Build StarCoreApp (rootless)
        working-directory: ./StarCoreApp
        env:
          THEOS_PACKAGE_SCHEME: rootless
        run: |
          make clean
          make package
      
      - name: Package IPA from .app
        run: |
          # Find the built .app bundle
          APP_DIR=$(find ./StarCoreApp/.theos/obj -name "*.app" -type d | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "No .app found"
            find ./StarCoreApp/.theos/obj -type f | head -20
            exit 1
          fi
          echo "Found app: $APP_DIR"
          ls -la "$APP_DIR/"
          
          # Copy Info.plist and resources if missing
          if [ ! -f "$APP_DIR/Info.plist" ]; then
            echo "Adding Info.plist..."
            cp ./StarCoreApp/Info.plist "$APP_DIR/"
          fi
          if [ ! -f "$APP_DIR/PkgInfo" ]; then
            echo "Adding PkgInfo..."
            echo -n "APPL????" > "$APP_DIR/PkgInfo"
          fi
          
          # Copy LaunchScreen if exists in resources
          if [ -d "./StarCoreApp/resources" ]; then
            cp -R ./StarCoreApp/resources/* "$APP_DIR/" 2>/dev/null || true
          fi
          
          echo "Final app contents:"
          ls -laR "$APP_DIR/"
          
          # Create proper IPA
          mkdir -p /tmp/IPA/Payload
          cp -R "$APP_DIR" /tmp/IPA/Payload/
          cd /tmp/IPA
          zip -r /tmp/StarCoreApp.ipa Payload/
          echo "IPA created!"
          ls -lh /tmp/StarCoreApp.ipa
      
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarCoreApp-v103
          path: /tmp/StarCoreApp.ipa
          retention-days: 30
      
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v10.3 /tmp/StarCoreApp.ipa --repo ${{ github.repository }} --clobber || \
          gh release create v10.3 /tmp/StarCoreApp.ipa \
            --repo ${{ github.repository }} \
            --title "v10.3" \
            --notes "StarCore App v10.3 - 开箱即用+在线更新"
